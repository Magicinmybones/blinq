<!DOCTYPE html>
<html lang="en" class="loading">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>blinq — the city moves electric</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg:        #06080b;
    --bg-soft:   #0c1015;
    --panel:     #10151c;
    --ink:       #eef3f6;
    --ink-dim:   #9aa7b2;
    --ink-faint: #5c6a76;
    --line:      rgba(255,255,255,.08);
    --accent:    #4fd4e8;   /* cyan from the battery-platform lighting */
    --accent-2:  #3b7be8;   /* electric blue */
    --nav-glass: rgba(50, 66, 74, 0.58);     /* deep slate-graphite glass */
    --nav-border:rgba(255, 255, 255, 0.12);  /* soft translucent white edge */
    --nav-menu:  #DCE5EA;                     /* cool gray-white menu text */
    --nav-cyan:  #5FE3FF;                     /* electric-cyan brand accent */
    --nav-contact:#B9F24A;                    /* refined premium tech-lime */
    --nav-demo:  #F4F7F8;                     /* clean off-white */
    --nav-ink:   #11181C;                     /* dark charcoal button text */
    --maxw: 1280px;
    --ease: cubic-bezier(.22,1,.36,1);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html { scroll-behavior:auto; -webkit-font-smoothing:antialiased; }  /* Lenis handles smoothing */

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Manrope', sans-serif;
    font-weight: 400;
    line-height: 1.6;
    overflow-x: hidden;
    letter-spacing: .1px;
  }

  /* atmospheric grain + glow */
  body::before {
    content:"";
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 1;
    background:
      radial-gradient(1200px 700px at 80% -5%, rgba(79,212,232,.10), transparent 60%),
      radial-gradient(900px 600px at 10% 110%, rgba(59,123,232,.08), transparent 60%);
    mix-blend-mode: screen;
  }

  img { display:block; width:100%; height:100%; object-fit:cover; }

  .wrap { max-width: var(--maxw); margin-inline:auto; padding-inline: 28px; }

  h1,h2,h3 { font-family:'Syne', sans-serif; font-weight:800; line-height:.98; letter-spacing:-.02em; }

  .eyebrow {
    font-size: 12px; letter-spacing:.32em; text-transform:uppercase;
    color: var(--accent); font-weight:600;
    display:inline-flex; align-items:center; gap:10px;
  }
  .eyebrow::before { content:""; width:26px; height:1px; background:var(--accent); opacity:.7; }

  /* ============ NAVBAR — frosted blue glass, no shadow ============ */
  .nav-shell {
    position: fixed;
    top: 18px; left: 0; right: 0;
    z-index: 100;
    display:flex; justify-content:center;
    padding-inline: 20px;
    pointer-events:none;
  }
  .navbar {
    pointer-events:auto;
    width: min(1180px, 100%);
    height: 64px;
    display:flex; align-items:center; gap: 14px;
    padding: 0 12px 0 20px;
    border-radius: 20px;               /* soft, rounded premium panel */
    background: var(--nav-glass);
    border: 1px solid var(--nav-border);
    backdrop-filter: blur(18px) saturate(150%);
    -webkit-backdrop-filter: blur(18px) saturate(150%);
    /* soft, wide, low-opacity floating shadow */
    box-shadow: 0 18px 50px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.06);
    transition: background .4s var(--ease);
  }
  /* brand: rounded-square mark + wordmark */
  .brand {
    display:flex; align-items:center; gap:11px; text-decoration:none;
    margin-right: 6px;
  }
  .brand-mark {
    width: 34px; height: 34px; border-radius: 10px;
    display:grid; place-items:center;
    background: linear-gradient(160deg, rgba(255,255,255,.16), rgba(255,255,255,.05));
    border: 1px solid rgba(255,255,255,.16);
    color: var(--nav-cyan);
  }
  .brand-mark svg { width: 17px; height: 17px; display:block; }
  .brand-name {
    font-family:'Syne', sans-serif; font-weight:800;
    font-size: 22px; letter-spacing:-.02em; color: #F4F7F8;
  }
  /* menu links with dropdown carets */
  .nav-links { display:flex; align-items:center; gap: 26px; margin-left: 8px; }
  .nav-links a {
    display:inline-flex; align-items:center; gap:6px;
    color: var(--nav-menu); opacity:.72; text-decoration:none;
    font-size: 15px; font-weight:500; letter-spacing:.005em;
    transition: opacity .25s var(--ease), color .25s var(--ease);
  }
  .nav-links a:hover { opacity:1; color:#FFFFFF; }
  .nav-links .caret { font-size:10px; opacity:.7; transform: translateY(1px); }

  /* right-side action cluster */
  .nav-actions { display:flex; align-items:center; gap: 10px; margin-left:auto; }

  /* frosted glass phone button */
  .nav-icon-btn {
    width: 44px; height: 44px; border-radius: 12px;
    display:grid; place-items:center;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.16);
    color: #F4F7F8; text-decoration:none;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    transition: background .25s var(--ease), border-color .25s var(--ease);
  }
  .nav-icon-btn:hover { background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.28); }
  .nav-icon-btn svg { width: 18px; height: 18px; display:block; }

  /* DEMO — clean off-white pill */
  .nav-demo {
    height: 44px; padding: 0 24px; border-radius: 12px;
    display:inline-flex; align-items:center;
    background: var(--nav-demo); color: var(--nav-ink);
    font-size: 12.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
    text-decoration:none;
    transition: transform .25s var(--ease), box-shadow .25s var(--ease);
  }
  .nav-demo:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0,0,0,.25); }

  /* CONTACT — accent button (refined tech-lime) */
  .nav-contact {
    height: 44px; padding: 0 26px; border-radius: 12px;
    display:inline-flex; align-items:center;
    background: var(--nav-contact); color: var(--nav-ink);
    font-size: 12.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
    text-decoration:none;
    transition: transform .25s var(--ease), box-shadow .25s var(--ease), filter .25s var(--ease);
  }
  .nav-contact:hover { transform: translateY(-1px); filter: brightness(1.05); box-shadow: 0 6px 22px rgba(185,242,74,.28); }
  .nav-burger { display:none; }

  /* ============ HERO — SCROLL-DRIVEN CINEMATIC VIDEO ============ */
  .hero-seq { position:relative; }
  .seq-outer { height: 360vh; }                 /* scroll length = scrub pacing */
  .seq {
    position:relative; height:100svh; width:100%;
    overflow:hidden; background: var(--bg);
  }
  .seq-video {
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; background: var(--bg);
    filter: brightness(.86) contrast(1.05);
    will-change: transform;
  }
  /* cinematic vignette + fade into the page below (no extra motion) */
  .seq::after {
    content:""; position:absolute; inset:0; z-index:2; pointer-events:none;
    background:
      radial-gradient(125% 95% at 50% 42%, transparent 55%, rgba(6,8,11,.55) 100%),
      linear-gradient(180deg, rgba(6,8,11,.28) 0%, transparent 20%, transparent 72%, var(--bg) 100%);
  }

  /* ============ MARQUEE ============ */
  .marquee { border-top:1px solid var(--line); border-bottom:1px solid var(--line); padding: 22px 0; overflow:hidden; background: var(--bg-soft); position:relative; z-index:2; }
  .marquee-track { display:flex; gap: 46px; width:max-content; animation: scrollx 26s linear infinite; }
  .marquee span { font-family:'Syne'; font-weight:700; font-size: clamp(20px,3vw,34px); color:var(--ink-faint); letter-spacing:-.01em; display:flex; align-items:center; gap:46px; text-transform:uppercase; }
  .marquee span::after { content:"◆"; color:var(--accent); font-size:.5em; }
  @keyframes scrollx { to { transform: translateX(-50%); } }

  /* ============ SECTION SHELL ============ */
  section { position:relative; z-index:2; }
  .section-pad { padding: clamp(90px, 14vh, 170px) 0; }

  .section-head { max-width: 760px; margin-bottom: 64px; }
  .section-head h2 { font-size: clamp(38px, 6vw, 82px); margin-top: 20px; }
  .section-head p { color: var(--ink-dim); font-size: clamp(16px,1.6vw,19px); margin-top: 22px; max-width: 560px; }

  /* split feature */
  .split { display:grid; grid-template-columns: 1fr 1fr; gap: clamp(30px,5vw,80px); align-items:center; }
  .split.reverse { direction:rtl; }
  .split.reverse > * { direction:ltr; }
  .split-media { position:relative; border-radius: 18px; overflow:hidden; border:1px solid var(--line); aspect-ratio: 16/11; }
  .split-media img { transform: scale(1.06); transition: transform 1.4s var(--ease); filter: contrast(1.05); }
  .split-media:hover img { transform: scale(1.12); }
  .split-copy h3 { font-size: clamp(30px,3.6vw,52px); margin: 18px 0 20px; }
  .split-copy p { color: var(--ink-dim); font-size: 17px; max-width: 480px; }
  .feature-list { list-style:none; margin-top: 34px; display:grid; gap: 2px; }
  .feature-list li { display:flex; justify-content:space-between; gap:20px; padding: 18px 4px; border-top:1px solid var(--line); font-size:15px; color:var(--ink); }
  .feature-list li span { color: var(--ink-faint); font-size:13px; letter-spacing:.14em; text-transform:uppercase; }

  /* ============ BATTERY / FULL-BLEED PIN ============ */
  .showcase { position:relative; min-height: 118svh; display:flex; align-items:center; overflow:hidden; }
  .showcase-media { position:absolute; inset:0; z-index:0; }
  .showcase-media img { transform: scale(1.14); filter: brightness(.62); }
  .showcase-media::after { content:""; position:absolute; inset:0; background: linear-gradient(90deg, rgba(6,8,11,.86) 0%, rgba(6,8,11,.45) 45%, rgba(6,8,11,.2) 100%); }
  .showcase .wrap { position:relative; z-index:2; }
  .showcase h2 { font-size: clamp(40px, 7vw, 96px); max-width: 12ch; }
  .showcase p { color: var(--ink-dim); font-size: clamp(16px,1.7vw,20px); max-width: 480px; margin-top: 26px; }
  .swap-badge { margin-top: 40px; display:inline-flex; align-items:center; gap:14px; padding: 14px 22px; border:1px solid var(--nav-border); border-radius:14px; background: var(--nav-glass); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); }
  .swap-badge b { font-family:'Syne'; font-size:22px; }
  .swap-badge small { color:var(--ink-dim); font-size:13px; }

  /* ============ GALLERY ============ */
  .gallery { display:grid; grid-template-columns: repeat(6, 1fr); grid-auto-rows: 220px; gap: 16px; }
  .gcell { position:relative; overflow:hidden; border-radius:16px; border:1px solid var(--line); }
  .gcell img { transform: scale(1.05); transition: transform 1.2s var(--ease), filter 1.2s var(--ease); filter: grayscale(.15) brightness(.85); }
  .gcell:hover img { transform: scale(1.12); filter: grayscale(0) brightness(1); }
  .gcell .tag { position:absolute; left:16px; bottom:14px; font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--ink); opacity:.85; z-index:2; }
  .g-wide { grid-column: span 4; }
  .g-tall { grid-column: span 2; grid-row: span 2; }
  .g-half { grid-column: span 2; }
  .g-third{ grid-column: span 2; }

  /* ============ STATS ============ */
  .stats { display:grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: var(--line); border:1px solid var(--line); border-radius:18px; overflow:hidden; }
  .stat { background: var(--bg); padding: 44px 30px; }
  .stat b { font-family:'Syne'; font-weight:800; font-size: clamp(44px,5.5vw,76px); letter-spacing:-.03em; display:block; }
  .stat b em { font-style:normal; color: var(--accent); font-size:.5em; }
  .stat span { color: var(--ink-dim); font-size:14px; letter-spacing:.04em; margin-top:8px; display:block; }

  /* ============ CTA ============ */
  .cta { text-align:center; padding: clamp(100px,16vh,200px) 0; }
  .cta h2 { font-size: clamp(46px, 9vw, 140px); text-transform:lowercase; }
  .cta h2 .accent { color:var(--accent); }
  .cta .btn { margin-top: 44px; display:inline-flex; align-items:center; gap:12px; height:60px; padding: 0 40px; border-radius:14px; background:var(--accent); color:#06080b; font-weight:600; font-size:17px; text-decoration:none; transition: transform .3s var(--ease), box-shadow .3s var(--ease); }
  .cta .btn:hover { transform: translateY(-2px); box-shadow: 0 0 40px rgba(79,212,232,.4); }

  /* ============ FOOTER ============ */
  footer { border-top:1px solid var(--line); padding: 60px 0 44px; position:relative; z-index:2; }
  .foot-grid { display:flex; justify-content:space-between; flex-wrap:wrap; gap:40px; align-items:flex-end; }
  .foot-brand { font-family:'Syne'; font-weight:800; font-size: clamp(40px,8vw,110px); letter-spacing:-.04em; line-height:.9; text-transform:lowercase; color:var(--ink); }
  .foot-cols { display:flex; gap:70px; }
  .foot-cols div { display:flex; flex-direction:column; gap:12px; }
  .foot-cols a { color:var(--ink-dim); text-decoration:none; font-size:14px; transition:color .2s; }
  .foot-cols a:hover { color:var(--accent); }
  .foot-cols h4 { color:var(--ink-faint); font-size:12px; letter-spacing:.2em; text-transform:uppercase; font-family:'Manrope'; font-weight:600; margin-bottom:6px; }
  .foot-base { margin-top:50px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:16px; color:var(--ink-faint); font-size:13px; }

  /* ============ SCROLL-REVEAL BASE STATES ============ */
  .reveal   { opacity:0; transform: translateY(38px); }
  .reveal-l { opacity:0; transform: translateX(-46px); }
  .reveal-r { opacity:0; transform: translateX(46px); }
  .reveal-scale { opacity:0; transform: scale(.94); }
  .is-in    { opacity:1 !important; transform: none !important; }
  .reveal, .reveal-l, .reveal-r, .reveal-scale {
    transition: opacity 1s var(--ease), transform 1.1s var(--ease);
    will-change: opacity, transform;
  }

  /* ============ INTRO PRELOADER ============ */
  html.loading, html.loading body { overflow: hidden !important; height: 100%; }
  .loader {
    position: fixed; inset: 0; z-index: 9999;
    background: #f3f5f6; color: #0b0f13;
    display: grid; place-items: center;
    will-change: transform;
  }
  .loader-count {
    display: flex; align-items: flex-start;
    font-family: 'Syne', sans-serif; font-weight: 800;
    line-height: .82; letter-spacing: -.05em;
  }
  #load-num { font-size: clamp(120px, 24vw, 360px); font-variant-numeric: tabular-nums; }
  .loader-pct {
    font-size: clamp(28px, 5vw, 60px); margin-left: .06em; margin-top: .2em;
    color: #12aecb; -webkit-text-fill-color: #12aecb;   /* deep cyan brand accent */
  }
  .loader-scatter { position: absolute; inset: 0; pointer-events: none; }
  .ls {
    position: absolute; font-family: 'Manrope', sans-serif;
    font-size: 11.5px; font-weight: 600; letter-spacing: .24em; text-transform: uppercase;
    color: #67757d;
  }
  .ls-tl { top: 26px; left: 28px; }
  .ls-tr { top: 26px; right: 28px; }
  .ls-ml { top: 50%; left: 28px; transform: translateY(-50%); }
  .ls-mr { top: 50%; right: 28px; transform: translateY(-50%); text-align: right; }
  .ls-bl { bottom: 30px; left: 28px; }
  .ls-br { bottom: 30px; right: 28px; }
  .loader-barwrap { position: absolute; left: 0; right: 0; bottom: 0; height: 3px; background: rgba(11,15,19,.08); }
  #load-bar { display: block; height: 100%; width: 100%; transform-origin: left center; transform: scaleX(0); background: #0b0f13; }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 900px) {
    .split { grid-template-columns: 1fr; }
    .split.reverse { direction:ltr; }
    .stats { grid-template-columns: repeat(2,1fr); }
    .gallery { grid-template-columns: repeat(2,1fr); grid-auto-rows: 200px; }
    .g-wide,.g-tall,.g-half,.g-third { grid-column: span 2; grid-row: span 1; }
    .g-tall { grid-row: span 1; }
    .nav-links { display:none; }
  }
  @media (max-width: 560px) {
    .stats { grid-template-columns: 1fr; }
    .gallery { grid-template-columns: 1fr; }
    .g-wide,.g-tall,.g-half,.g-third { grid-column: span 1; }
    .hero-sub { flex-direction:column; align-items:flex-start; }
    .hero-sub .meta { text-align:left; }
    .navbar { height:64px; padding-left:20px; }
    .nav-cta { padding:0 16px; height:42px; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; }
    .reveal,.reveal-l,.reveal-r,.reveal-scale { opacity:1 !important; transform:none !important; }
    /* no scroll-scrub: show the video statically at one viewport height */
    .seq-outer { height:100svh; }
  }
</style>
</head>
<body>

  <!-- INTRO PRELOADER (counts 0→100 while the hero video buffers behind it) -->
  <div id="loader" class="loader">
    <div class="loader-scatter" aria-hidden="true">
      <span class="ls ls-tl">Blinq / EV</span>
      <span class="ls ls-tr">Est. 2026</span>
      <span class="ls ls-ml">Cinematic Showroom</span>
      <span class="ls ls-mr">Battery Swap · 2:48</span>
      <span class="ls ls-bl">Loading Assets</span>
      <span class="ls ls-br">The City Moves Electric</span>
    </div>
    <div class="loader-count"><span id="load-num">00</span><span class="loader-pct">%</span></div>
    <div class="loader-barwrap"><i id="load-bar"></i></div>
  </div>
  <script>
    /* Hard safety net: never let the intro trap the user, even if the main
       script fails to load (e.g. a blocked CDN). */
    window.__loaderDone = false;
    setTimeout(function () {
      if (window.__loaderDone) return;
      var l = document.getElementById('loader');
      if (l) l.parentNode && l.parentNode.removeChild(l);
      document.documentElement.classList.remove('loading');
    }, 9000);
  </script>

  <!-- NAVBAR -->
  <div class="nav-shell">
    <nav class="navbar">
      <a href="#top" class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="3" width="16" height="18" rx="2" stroke="currentColor" stroke-width="1.8"/>
            <path d="M9 3v18M12 7h4M12 11h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="brand-name">Terminal</span>
      </a>

      <div class="nav-links">
        <a href="#">System <span class="caret">▾</span></a>
        <a href="#">Markets <span class="caret">▾</span></a>
        <a href="#">Featured <span class="caret">▾</span></a>
        <a href="#">Resources <span class="caret">▾</span></a>
        <a href="#">About</a>
      </div>

      <div class="nav-actions">
        <a href="#" class="nav-icon-btn" aria-label="Call us">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6.5 4h2.2l1.3 3.3-1.7 1.2a12 12 0 0 0 5.2 5.2l1.2-1.7L18 13.3V15.5A2.5 2.5 0 0 1 15.5 18 12.5 12.5 0 0 1 3 5.5 1.5 1.5 0 0 1 4.5 4Z"
                  stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
          </svg>
        </a>
        <a href="#" class="nav-demo">Demo</a>
        <a href="#" class="nav-contact">Contact</a>
      </div>
    </nav>
  </div>

  <!-- HERO — scroll-driven cinematic video (scroll scrubs playback) -->
  <header class="hero-seq" id="top">
    <div class="seq-outer">
      <div class="seq">
        <!-- all-intra re-encode (every frame a keyframe) for smooth scroll-scrubbing -->
        <video class="seq-video" playsinline muted preload="auto"
               src="assets/video_scrub.mp4"></video>
      </div>
    </div>
  </header>

  <!-- ===== BELOW-HERO SECTIONS TEMPORARILY DISABLED (hero-only mode) =====
  [MARQUEE]
  <div class="marquee">
    <div class="marquee-track">
      <span>zero emissions</span><span>swap · don't wait</span><span>city native</span><span>silent drive</span>
      <span>zero emissions</span><span>swap · don't wait</span><span>city native</span><span>silent drive</span>
    </div>
  </div>

  [DESIGN / SPLIT 1]
  <section class="section-pad" id="design">
    <div class="wrap">
      <div class="section-head">
        <span class="eyebrow reveal">01 — Exterior</span>
        <h2 class="reveal">Small footprint.<br/>Big presence.</h2>
        <p class="reveal">Every millimetre is intentional. A tall glasshouse for visibility, flush surfaces for efficiency, and a stance that owns the lane without owning the street.</p>
      </div>
      <div class="split">
        <div class="split-media reveal-scale"><img src="assets/1.png" alt="blinq side profile" /></div>
        <div class="split-copy">
          <span class="eyebrow reveal-r">Proportion</span>
          <h3 class="reveal-r">Designed around you, not the engine.</h3>
          <p class="reveal-r">With no combustion hardware, the cabin pushes to the corners — four real seats and a flat floor inside a body shorter than most hatchbacks.</p>
          <ul class="feature-list">
            <li class="reveal-r">Length <span>3,120 mm</span></li>
            <li class="reveal-r">Turning circle <span>4.2 m</span></li>
            <li class="reveal-r">Aero drag <span>Cd 0.29</span></li>
          </ul>
        </div>
      </div>
    </div>
  </section>

  [SPLIT 2 reverse]
  <section class="section-pad" style="padding-top:0;">
    <div class="wrap">
      <div class="split reverse">
        <div class="split-media reveal-scale"><img src="assets/2.png" alt="blinq profile studio" /></div>
        <div class="split-copy">
          <span class="eyebrow reveal-l">02 — Character</span>
          <h3 class="reveal-l">A face the city remembers.</h3>

  <!-- GSAP + ScrollTrigger + Lenis (smooth scroll) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.14/dist/lenis.min.js"></script>
  <script>
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    if (window.gsap && window.ScrollTrigger && !reduce) {
      gsap.registerPlugin(ScrollTrigger);

      /* ---- Smooth inertia scrolling (Lenis) driven by GSAP's ticker ----
         Lenis interpolates the real page scroll so wheel/trackpad input feels
         weighted and continuous; ScrollTrigger reads from it every frame, which
         makes the pinned video scrub glide instead of stepping. */
      let lenis = null;
      if (window.Lenis) {
        lenis = new Lenis({
          duration: 1.15,                                   // inertia weight
          easing: (t) => 1 - Math.pow(1 - t, 3),            // gentle ease-out
          smoothWheel: true,
        });
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time) => lenis.raf(time * 1000));
        gsap.ticker.lagSmoothing(0);
        lenis.stop();                                       // locked until the intro finishes
      }

      /* Standard scroll-trigger reveal: fade + slide/scale as each element
         crosses 88% of the viewport. CSS transitions handle the easing. */
      document.querySelectorAll('.reveal, .reveal-l, .reveal-r, .reveal-scale').forEach((el) => {
        ScrollTrigger.create({
          trigger: el,
          start: 'top 88%',
          onEnter: () => el.classList.add('is-in'),
        });
      });

      /* ---- HERO: scroll-driven cinematic video scrubbing ----
         The pinned video's currentTime is tied to scroll progress, so the
         camera descent in the clip is physically driven by the user's scroll.
         GSAP's scrub adds an eased lag so the motion feels premium, never jumpy. */
      const video = document.querySelector('.seq-video');

      // keep it fully under our control (no native playback)
      video.pause();
      video.muted = true;
      video.playsInline = true;

      const buildVideoScrub = () => {
        const duration = video.duration;
        if (!duration || !isFinite(duration)) return;

        // proxy object we tween; we write currentTime from it to avoid
        // firing redundant seeks when the target frame hasn't changed.
        const state = { t: 0 };
        let last = -1;

        gsap.to(state, {
          t: duration,
          ease: 'none',
          scrollTrigger: {
            trigger: '.seq-outer',
            start: 'top top',
            end: 'bottom bottom',
            scrub: 0.4,           // light catch-up; Lenis supplies the smoothness
            pin: '.seq',
            anticipatePin: 1,
          },
          onUpdate() {
            const t = state.t;
            // skip sub-frame updates the decoder would ignore anyway (~30fps)
            if (Math.abs(t - last) < 1 / 30) return;
            last = t;
            // seekable once metadata is in; browsers coalesce rapid seeks to
            // the latest target, so the scrub never sticks while scrolling fast
            if (video.readyState >= 1 && video.seekable.length) {
              video.currentTime = Math.min(t, video.duration - 0.001);
            }
          },
        });
      };

      // Force the video's OWN first frame to paint immediately (no poster,
      // so the starting state is the video, never a static asset image).
      const primeFirstFrame = () => { try { video.currentTime = 0; } catch (e) {} };
      if (video.readyState >= 2) primeFirstFrame();
      else video.addEventListener('loadeddata', primeFirstFrame, { once: true });

      // preload, then wire scrubbing once the browser knows the duration
      if (video.readyState >= 1 && video.duration) {
        buildVideoScrub();
      } else {
        video.addEventListener('loadedmetadata', buildVideoScrub, { once: true });
      }
      video.load();

      /* Parallax on the battery showcase media */
      gsap.utils.toArray('.showcase-media img').forEach((img) => {
        gsap.to(img, {
          yPercent: 12,
          ease: 'none',
          scrollTrigger: {
            trigger: img.closest('.showcase'),
            start: 'top top',
            end: 'bottom top',
            scrub: true,
          },
        });
      });

      /* Navbar glass deepens slightly once you leave the hero (height unchanged) */
      const navbar = document.querySelector('.navbar');
      ScrollTrigger.create({
        start: 'top -80',
        onUpdate: (self) => {
          navbar.style.background = self.scroll() > 80
            ? 'rgba(45, 60, 68, 0.72)'
            : '';
        }
      });

      /* ---- INTRO PRELOADER ----
         Counts 0→100 while the hero video buffers behind the white panel.
         Pro pattern: a brisk time-based crawl toward ~92, blended with the
         video's real buffered fraction, that only reaches 100 once the clip
         can play through — then an eased curtain reveal into the scene. */
      (function runLoader() {
        const loader = document.getElementById('loader');
        if (!loader) { if (lenis) lenis.start(); return; }
        const numEl = document.getElementById('load-num');
        const barEl = document.getElementById('load-bar');
        let ready = false, done = false, shown = 0;
        const t0 = performance.now();

        // entrance
        gsap.from('.loader-count', { yPercent: 12, opacity: 0, duration: .7, ease: 'power3.out' });
        gsap.from('.ls', { opacity: 0, y: 8, duration: .6, stagger: .06, ease: 'power2.out' });

        video.addEventListener('canplaythrough', () => { ready = true; }, { once: true });

        const realFrac = () => {
          if (video.readyState >= 4) return 1;
          if (video.duration && video.buffered.length) {
            return Math.min(1, video.buffered.end(video.buffered.length - 1) / video.duration);
          }
          return 0;
        };

        const finish = () => {
          if (done) return; done = true; window.__loaderDone = true;
          gsap.timeline({
            onComplete() {
              loader.remove();
              document.documentElement.classList.remove('loading');
              if (lenis) lenis.start();
              window.scrollTo(0, 0);
              ScrollTrigger.refresh();
            }
          })
          .to('#load-num', { yPercent: -20, opacity: 0, duration: .45, ease: 'power2.in' }, 0)
          .to('.loader-pct', { opacity: 0, duration: .3 }, 0)
          .to('.ls', { opacity: 0, duration: .35, stagger: .03 }, 0)
          .to(loader, { yPercent: -100, duration: 1.0, ease: 'power4.inOut' }, .2);
        };

        const tick = (now) => {
          const elapsed = (now - t0) / 1000;
          const timeTarget = Math.min(92, (elapsed / 1.3) * 92);   // brisk crawl
          let target = Math.max(timeTarget, realFrac() * 100);
          target = ready ? 100 : Math.min(target, 99);
          shown += (target - shown) * 0.14;
          if (target === 100 && target - shown < 0.6) shown = 100;
          const v = Math.min(100, Math.floor(shown));
          if (numEl) numEl.textContent = String(v).padStart(2, '0');
          if (barEl) barEl.style.transform = 'scaleX(' + (v / 100) + ')';
          if (v >= 100) { finish(); return; }
          requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);

        // safety: force-complete if the video never signals canplaythrough
        setTimeout(() => { ready = true; }, 4500);
      })();

    } else {
      /* Fallback (no GSAP / reduced motion): drop the intro, unlock, reveal */
      const l = document.getElementById('loader');
      if (l) l.remove();
      document.documentElement.classList.remove('loading');
      window.__loaderDone = true;
      document.querySelectorAll('.reveal, .reveal-l, .reveal-r, .reveal-scale')
        .forEach(el => el.classList.add('is-in'));
    }
  </script>
